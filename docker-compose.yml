version: '3.8'

services:
  soumissions-entreprises:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DATA_DIR=/app/data
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s